<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محرر الصور بُصر</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700;900&family=Almarai:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Cairo;
background:#f4f4f4;
text-align:center;
padding:20px;
}
.panel{
background:white;
padding:20px;
border-radius:14px;
max-width:950px;
margin:auto;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}
input,select,button{
margin:6px;
padding:8px;
border-radius:8px;
}
button{
background:black;
color:white;
cursor:pointer;
}
canvas{
margin-top:20px;
max-width:95%;
border-radius:12px;
}
</style>
</head>

<body>

<h1>✨ محرر الصور بُصر</h1>

<div class="panel">

<input type="file" id="imgUpload">

<br>

<input type="number" id="w" placeholder="عرض">
<input type="number" id="h" placeholder="ارتفاع">
<button onclick="resizeImg()">تغيير المقاس</button>

<br>

<button onclick="rotate()">تدوير</button>
<button onclick="reset()">استعادة</button>

<hr>

<h3>✍️ نص على الصورة</h3>
<input id="textTop" placeholder="النص على الصورة">
<input type="color" id="colorTop">
<select id="fontTop">
<option value="Cairo">Cairo</option>
<option value="Tajawal">Tajawal</option>
<option value="Almarai">Almarai</option>
</select>
<input type="number" id="sizeTop" value="40">
<button onclick="drawText()">إضافة</button>

<hr>

<h3>🧾 شريط سفلي</h3>
<input id="textBar" placeholder="نص الشريط">
<input type="color" id="barColor" value="#ffffff">
<input type="number" id="barH" value="80">
<button onclick="drawBar()">إضافة</button>

<hr>

<h3>🎨 طبقة شفافة</h3>
<input type="color" id="overlayColor">
<input type="range" id="opacity" min="0" max="1" step="0.1" value="0.3">
<select id="overlayPos">
<option value="top">أعلى</option>
<option value="center">وسط</option>
<option value="bottom">أسفل</option>
</select>
<button onclick="overlay()">تطبيق</button>

<hr>

<h3>🖼️ شعار</h3>
<input type="file" id="logoUpload">
<select id="logoPos">
<option value="right">يمين</option>
<option value="left">يسار</option>
</select>
<input type="number" id="logoSize" value="120">
<button onclick="addLogo()">إضافة شعار</button>

<hr>

<button onclick="download()">تحميل</button>
<button onclick="copyImg()">نسخ</button>

</div>

<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let img=new Image();

function HQ(){ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";}

document.getElementById("imgUpload").onchange=e=>{
const f=e.target.files[0];
const r=new FileReader();
r.onload=ev=>{
img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
HQ();
ctx.drawImage(img,0,0);
document.getElementById("w").value=img.width;
document.getElementById("h").value=img.height;
}
img.src=ev.target.result;
}
r.readAsDataURL(f);
}

function resizeImg(){
let w=+wInput.value,h=+hInput.value;
let t=new Image();
t.onload=()=>{
canvas.width=w;canvas.height=h;
HQ();ctx.drawImage(t,0,0,w,h);
}
t.src=canvas.toDataURL();
}

function rotate(){
let t=document.createElement("canvas");
let x=t.getContext("2d");
t.width=canvas.height;
t.height=canvas.width;
x.translate(t.width/2,t.height/2);
x.rotate(Math.PI/2);
x.drawImage(canvas,-canvas.width/2,-canvas.height/2);
canvas.width=t.width;canvas.height=t.height;
ctx.drawImage(t,0,0);
}

function reset(){
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
}

function drawText(){
ctx.fillStyle=colorTop.value;
ctx.font=`bold ${sizeTop.value}px ${fontTop.value}`;
ctx.textAlign="center";
ctx.fillText(textTop.value,canvas.width/2,canvas.height/2);
}

function drawBar(){
let h=+barH.value;
let t=new Image();
t.onload=()=>{
canvas.height=t.height+h;
canvas.width=t.width;
ctx.fillStyle=barColor.value;
ctx.fillRect(0,t.height,t.width,h);
ctx.drawImage(t,0,0);
ctx.fillStyle="#000";
ctx.textAlign="center";
ctx.fillText(textBar.value,t.width/2,t.height+h/2);
}
t.src=canvas.toDataURL();
}

function overlay(){
let col=overlayColor.value;
let op=opacity.value;
ctx.fillStyle=col;
ctx.globalAlpha=op;
let y=0;
if(overlayPos.value=="center") y=canvas.height/3;
if(overlayPos.value=="bottom") y=canvas.height*2/3;
ctx.fillRect(0,y,canvas.width,canvas.height/3);
ctx.globalAlpha=1;
}

function addLogo(){
let f=logoUpload.files[0];
let r=new FileReader();
r.onload=e=>{
let l=new Image();
l.onload=()=>{
let s=logoSize.value;
let x=logoPos.value=="right"?canvas.width-s-10:10;
ctx.drawImage(l,x,10,s,s);
}
l.src=e.target.result;
}
r.readAsDataURL(f);
}

function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download="busr.png";
a.click();
}

function copyImg(){
canvas.toBlob(b=>{
navigator.clipboard.write([new ClipboardItem({"image/png":b})]);
alert("تم النسخ");
});
}
</script>

</body>
</html>
