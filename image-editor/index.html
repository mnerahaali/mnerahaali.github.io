<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محرر الصور بُصر</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700;900&family=Almarai:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;700&family=Readex+Pro:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;background:#f5f5f5;text-align:center;padding:20px;}
.panel{background:white;padding:20px;border-radius:14px;max-width:950px;margin:auto;box-shadow:0 4px 15px rgba(0,0,0,.08);}
input,select,button{margin:6px;padding:8px;border-radius:8px;}
button{background:black;color:white;cursor:pointer;}
canvas{margin-top:20px;max-width:95%;border-radius:12px;}
</style>
</head>

<body>

<h1>✨ محرر الصور بُصر</h1>

<div class="panel">

<input type="file" id="imgUpload">

<br>

<input type="number" id="w" placeholder="عرض">
<input type="number" id="h" placeholder="ارتفاع">
<button onclick="resizeImg()">تغيير المقاس</button>

<br>

<button onclick="rotate()">تدوير</button>
<button onclick="reset()">استعادة</button>

<hr>

<h3>✍️ نص على الصورة</h3>
<input id="textTop" placeholder="النص">
<input type="color" id="colorTop" value="#000000">
<select id="fontTop">
<option>Cairo</option>
<option>Tajawal</option>
<option>Almarai</option>
<option>Noto Sans Arabic</option>
<option>IBM Plex Sans Arabic</option>
<option>Readex Pro</option>
<option>Amiri</option>
<option>Arial</option>
<option>Tahoma</option>
</select>
<input type="number" id="sizeTop" value="40">
<button onclick="drawText()">إضافة</button>

<hr>

<h3>🧾 الشريط السفلي</h3>
<input id="textBar" placeholder="نص الشريط">
<input type="color" id="barColor" value="#ffffff">
<input type="color" id="barTextColor" value="#000000">
<input type="number" id="barH" value="80">
<input type="number" id="barFontSize" value="30">

<select id="barFont">
<option>Cairo</option>
<option>Tajawal</option>
<option>Almarai</option>
<option>Noto Sans Arabic</option>
<option>IBM Plex Sans Arabic</option>
<option>Readex Pro</option>
<option>Amiri</option>
<option>Arial</option>
<option>Tahoma</option>
</select>

<button onclick="drawBar()">إضافة الشريط</button>

<hr>

<h3>🎨 طبقة شفافة</h3>
<input type="color" id="overlayColor" value="#000000">
<input type="range" id="opacity" min="0" max="1" step="0.1" value="0.3">

<select id="overlayPos">
<option value="top">أعلى</option>
<option value="center">وسط</option>
<option value="bottom">أسفل</option>
</select>

<input type="number" id="overlayH" value="150">
<button onclick="overlay()">تطبيق</button>

<hr>

<h3>🖼️ شعار</h3>
<input type="file" id="logoUpload">

<select id="logoPos">
<option value="tr">أعلى يمين</option>
<option value="tl">أعلى يسار</option>
<option value="br">أسفل يمين</option>
<option value="bl">أسفل يسار</option>
</select>

<input type="number" id="logoWidth" value="120">
<button onclick="addLogo()">إضافة الشعار</button>

<hr>

<button onclick="download()">تحميل</button>
<button onclick="copyImg()">نسخ</button>

</div>

<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let img=new Image();

function HQ(){ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";}

imgUpload.onchange=e=>{
let r=new FileReader();
r.onload=ev=>{
img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
HQ();
ctx.drawImage(img,0,0);
w.value=img.width;
h.value=img.height;
}
img.src=ev.target.result;
}
r.readAsDataURL(e.target.files[0]);
}

function resizeImg(){
let t=new Image();
t.onload=()=>{
canvas.width=w.value;
canvas.height=h.value;
HQ();
ctx.drawImage(t,0,0,w.value,h.value);
}
t.src=canvas.toDataURL();
}

function rotate(){
let t=document.createElement("canvas");
let x=t.getContext("2d");
t.width=canvas.height;
t.height=canvas.width;
x.translate(t.width/2,t.height/2);
x.rotate(Math.PI/2);
x.drawImage(canvas,-canvas.width/2,-canvas.height/2);
canvas.width=t.width;
canvas.height=t.height;
ctx.drawImage(t,0,0);
}

function reset(){
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
}

function drawText(){
ctx.fillStyle=colorTop.value;
ctx.font=`bold ${sizeTop.value}px ${fontTop.value}`;
ctx.textAlign="center";
ctx.fillText(textTop.value,canvas.width/2,canvas.height/2);
}

function drawBar(){
let hgt=+barH.value;
let t=new Image();
t.onload=()=>{
canvas.height=t.height+hgt;
canvas.width=t.width;

ctx.fillStyle=barColor.value;
ctx.fillRect(0,t.height,t.width,hgt);

ctx.drawImage(t,0,0);

ctx.fillStyle=barTextColor.value;
ctx.font=`bold ${barFontSize.value}px ${barFont.value}`;
ctx.textAlign="center";
ctx.fillText(textBar.value,t.width/2,t.height+hgt/2);
}
t.src=canvas.toDataURL();
}

function overlay(){
ctx.globalAlpha=opacity.value;
ctx.fillStyle=overlayColor.value;

let y=0;
if(overlayPos.value=="center") y=canvas.height/2-overlayH.value/2;
if(overlayPos.value=="bottom") y=canvas.height-overlayH.value;

ctx.fillRect(0,y,canvas.width,overlayH.value);
ctx.globalAlpha=1;
}

function addLogo(){
let r=new FileReader();
r.onload=e=>{
let l=new Image();
l.onload=()=>{
let w=logoWidth.value;
let ratio=l.height/l.width;
let h=w*ratio;

let margin=20;

let x=margin,y=margin;

if(logoPos.value=="tr"){x=canvas.width-w-margin;y=margin;}
if(logoPos.value=="tl"){x=margin;y=margin;}
if(logoPos.value=="br"){x=canvas.width-w-margin;y=canvas.height-h-margin;}
if(logoPos.value=="bl"){x=margin;y=canvas.height-h-margin;}

ctx.drawImage(l,x,y,w,h);
}
l.src=e.target.result;
}
r.readAsDataURL(logoUpload.files[0]);
}

function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL("image/png",1);
a.download="busr.png";
a.click();
}

function copyImg(){
canvas.toBlob(b=>{
navigator.clipboard.write([new ClipboardItem({"image/png":b})]);
alert("تم النسخ");
});
}
</script>

</body>
</html>
