<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محرر الصور</title>

<style>
body {
font-family: Arial;
text-align: center;
background: #f5f5f5;
}

canvas {
margin-top: 20px;
max-width: 90%;
border-radius: 10px;
}

input, button {
margin: 10px;
padding: 10px;
}
</style>
</head>

<body>

<h1>✨ محرر الصور</h1>

<input type="file" id="upload">

<br>

<label>عرض الصورة:</label>
<input type="number" id="width">

<label>ارتفاع:</label>
<input type="number" id="height">

<button onclick="resizeImage()">تغيير المقاس</button>

<br>

<input type="text" id="textInput" placeholder="اكتبي النص هنا">

<button onclick="addText()">إضافة نص</button>

<br>

<button onclick="copyImage()">نسخ الصورة</button>

<br>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();

document.getElementById("upload").addEventListener("change", function(e) {
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(event) {
img.src = event.target.result;
};

reader.readAsDataURL(file);
});

img.onload = function() {
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
};

// تغيير المقاس
function resizeImage() {
let w = document.getElementById("width").value;
let h = document.getElementById("height").value;

canvas.width = w;
canvas.height = h;

ctx.drawImage(img, 0, 0, w, h);
}

// إضافة نص (بدون تدرج)
function addText() {
let text = document.getElementById("textInput").value;

ctx.fillStyle = "white";
ctx.font = "30px Arial";
ctx.fillText(text, 20, canvas.height - 40);
}

// نسخ الصورة
function copyImage() {
canvas.toBlob(function(blob) {
const item = new ClipboardItem({ "image/png": blob });
navigator.clipboard.write([item]);
alert("تم نسخ الصورة ✅");
});
}
</script>

</body>
</html>
