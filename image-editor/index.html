<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محرر الصور المتقدم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&family=Tajawal&family=Almarai&display=swap" rel="stylesheet">

<style>
body{
font-family: Cairo;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.panel{
background:#fff;
padding:15px;
border-radius:12px;
margin:auto;
max-width:900px;
}

canvas{
border-radius:10px;
margin-top:20px;
cursor:default;
}

input,select,button{
margin:5px;
padding:8px;
}
</style>
</head>

<body>

<h2>✨ محرر احترافي</h2>

<div class="panel">

<input type="file" id="upload">

<br>

<input id="textInput" placeholder="اكتب النص">
<button onclick="addText()">➕ إضافة نص</button>

<select id="fontFamily">
<option value="Cairo">Cairo</option>
<option value="Tajawal">Tajawal</option>
<option value="Almarai">Almarai</option>
<option value="Arial">Arial</option>
</select>

<input type="color" id="color" value="#ffffff">
<input type="range" id="size" min="20" max="100" value="40">

<br>

<button onclick="download()">تحميل</button>
<button onclick="copyImage()">نسخ</button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let image = new Image();
let texts = [];
let selected = null;

document.getElementById("upload").onchange = e=>{
const reader = new FileReader();
reader.onload = ev=>{
image.src = ev.target.result;
}
reader.readAsDataURL(e.target.files[0]);
};

image.onload = ()=>{
canvas.width = image.width;
canvas.height = image.height;
draw();
};

function addText(){
texts.push({
text: document.getElementById("textInput").value,
x: canvas.width/2,
y: canvas.height/2,
size: 40,
color: "#ffffff",
font: "Cairo"
});
draw();
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(image,0,0);

texts.forEach((t,i)=>{
ctx.fillStyle = t.color;
ctx.font = `${t.size}px ${t.font}`;
ctx.textAlign = "center";
ctx.fillText(t.text, t.x, t.y);

if(i===selected){
ctx.strokeStyle="red";
ctx.strokeRect(t.x-50,t.y-50,100,100);
}
});
}

canvas.onmousedown = e=>{
const rect = canvas.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

selected = null;

texts.forEach((t,i)=>{
if(Math.abs(x - t.x) < 80 && Math.abs(y - t.y) < 40){
selected = i;
}
});

draw();
};

canvas.onmousemove = e=>{
if(selected === null) return;

const rect = canvas.getBoundingClientRect();
texts[selected].x = e.clientX - rect.left;
texts[selected].y = e.clientY - rect.top;

draw();
};

document.getElementById("size").oninput = ()=>{
if(selected !== null){
texts[selected].size = event.target.value;
draw();
}
};

document.getElementById("color").oninput = ()=>{
if(selected !== null){
texts[selected].color = event.target.value;
draw();
}
};

document.getElementById("fontFamily").onchange = ()=>{
if(selected !== null){
texts[selected].font = event.target.value;
draw();
}
};

function download(){
const link = document.createElement("a");
link.download = "image.png";
link.href = canvas.toDataURL();
link.click();
}

async function copyImage(){
canvas.toBlob(async blob=>{
await navigator.clipboard.write([
new ClipboardItem({"image/png": blob})
]);
alert("تم النسخ");
});
}

</script>

</body>
</html>
