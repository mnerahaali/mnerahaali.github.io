<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محرر الصور</title>

<style>
body {
font-family: Arial;
text-align: center;
background: #f5f5f5;
}

canvas {
margin-top: 20px;
max-width: 90%;
border-radius: 10px;
}

.controls {
margin-top: 20px;
}

button, input {
margin: 5px;
padding: 10px;
}
</style>
</head>

<body>

<h1>✨ محرر الصور</h1>

<input type="file" id="upload">

<div class="controls">
<input type="number" id="width" placeholder="العرض">
<input type="number" id="height" placeholder="الارتفاع">
<button onclick="resizeImage()">تغيير المقاس</button>

<button onclick="rotate()">تدوير</button>
<button onclick="cropCenter()">قص (منتصف)</button>

<button onclick="download()">تحميل</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();

document.getElementById("upload").addEventListener("change", function(e) {
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(event) {
img.src = event.target.result;
};

reader.readAsDataURL(file);
});

img.onload = function() {
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
};

// تغيير المقاس
function resizeImage() {
let w = document.getElementById("width").value;
let h = document.getElementById("height").value;

canvas.width = w;
canvas.height = h;

ctx.drawImage(img, 0, 0, w, h);
}

// تدوير
function rotate() {
let tempCanvas = document.createElement("canvas");
let tempCtx = tempCanvas.getContext("2d");

tempCanvas.width = canvas.height;
tempCanvas.height = canvas.width;

tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
tempCtx.rotate(Math.PI / 2);
tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);

canvas.width = tempCanvas.width;
canvas.height = tempCanvas.height;

ctx.drawImage(tempCanvas, 0, 0);
}

// قص من المنتصف
function cropCenter() {
let cropWidth = canvas.width / 2;
let cropHeight = canvas.height / 2;

let x = (canvas.width - cropWidth) / 2;
let y = (canvas.height - cropHeight) / 2;

let imageData = ctx.getImageData(x, y, cropWidth, cropHeight);

canvas.width = cropWidth;
canvas.height = cropHeight;

ctx.putImageData(imageData, 0, 0);
}

// تحميل
function download() {
let link = document.createElement("a");
link.download = "image.png";
link.href = canvas.toDataURL();
link.click();
}
</script>

</body>
</html>
