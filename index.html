<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🍃 بُصر للباركود</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f8f6;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

h2 {
  margin-top: 20px;
  color: #2e7d32;
}

input {
  width: 340px;
  max-width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
}

button {
  padding: 10px 18px;
  margin: 6px;
  border: none;
  border-radius: 10px;
  background: #2e7d32;
  color: white;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
}

button:hover {
  background: #1b5e20;
}

#qrcode {
  margin-top: 24px;
  min-height: 220px;
}

#barcodeInfo {
  margin-top: 10px;
  color: #2e7d32;
  font-size: 14px;
  line-height: 1.9;
  display: none;
}

#actions {
  display: none;
  margin-top: 15px;
}
</style>
</head>

<body>
<div class="container">

  <h2>🍃 صانع بُصر للباركود 🍃</h2>

  <input type="text" id="barcodeName" placeholder="اسم الباركود">
  <br>
  <input type="text" id="url" placeholder="ألصقي الرابط هنا">
  <br>

  <button onclick="generateQR()">إنشاء الباركود</button>

  <div id="qrcode"></div>

  <div id="barcodeInfo"></div>

  <div id="actions">
    <button onclick="downloadQR()">تحميل الباركود</button>
    <button onclick="copyQRImage()">نسخ صورة الباركود</button>
    <button onclick="copyLink()">نسخ الرابط</button>
  </div>

</div>

<script>
let canvasQR = null;
let currentURL = "";
let currentName = "";
let currentDate = "";

function generateQR() {
  let url = document.getElementById("url").value.trim();
  let name = document.getElementById("barcodeName").value.trim();

  if (!url) {
    alert("فضلاً أدخلي الرابط أولاً");
    return;
  }

  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }

  currentURL = url;
  currentName = name || "بدون اسم";
  currentDate = new Date().toLocaleString("ar-SA");

  document.getElementById("qrcode").innerHTML = "";

  QRCode.toCanvas(document.createElement("canvas"), currentURL, function (error, canvas) {
    if (error) {
      alert("حدث خطأ أثناء إنشاء الباركود");
      return;
    }

    canvasQR = canvas;
    document.getElementById("qrcode").appendChild(canvas);

    document.getElementById("barcodeInfo").style.display = "block";
    document.getElementById("barcodeInfo").innerHTML = `
      <div><strong>الاسم:</strong> ${escapeHtml(currentName)}</div>
      <div><strong>تاريخ الإنشاء:</strong> ${escapeHtml(currentDate)}</div>
    `;

    document.getElementById("actions").style.display = "block";
  });
}

function downloadQR() {
  if (!canvasQR) {
    alert("أنشئي الباركود أولاً");
    return;
  }

  let link = document.createElement("a");
  link.download = "busr-qr.png";
  link.href = canvasQR.toDataURL("image/png");
  link.click();
}

function copyLink() {
  if (!currentURL) {
    alert("أنشئي الباركود أولاً");
    return;
  }

  navigator.clipboard.writeText(currentURL)
    .then(() => alert("تم نسخ الرابط ✅"))
    .catch(() => alert("تعذر نسخ الرابط"));
}

function copyQRImage() {
  if (!canvasQR) {
    alert("أنشئي الباركود أولاً");
    return;
  }

  canvasQR.toBlob(blob => {
    if (!blob) {
      alert("تعذر نسخ صورة الباركود");
      return;
    }

    const item = new ClipboardItem({ "image/png": blob });
    navigator.clipboard.write([item])
      .then(() => alert("تم نسخ صورة الباركود 📷"))
      .catch(() => alert("المتصفح لم يسمح بنسخ الصورة"));
  });
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
</body>
</html>
