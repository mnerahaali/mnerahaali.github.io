<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🍃 بُصر للباركود</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f8f6;
}

h2 {
  margin-top: 40px;
  color: #2e7d32;
  cursor: pointer;
}

input {
  width: 300px;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  margin: 8px;
  border: none;
  border-radius: 8px;
  background: #2e7d32;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1b5e20;
}

#qrcode {
  margin-top: 20px;
}

#actions {
  display: none;
  margin-top: 15px;
}
</style>
</head>

<body>

<h2 ondblclick="window.location.href='busr-leaf.html'">
🍃 صانع بُصر للباركود 🍃
</h2>

<input type="text" id="url" placeholder="ألصقي الرابط هنا">

<br>

<button onclick="generateQR()">إنشاء الباركود</button>

<div id="qrcode"></div>

<div id="actions">
  <button onclick="downloadQR()">تحميل</button>
  <button onclick="copyLink()">نسخ الرابط</button>
  <button onclick="copyQR()">نسخ صورة الباركود</button>
</div>

<script>
let canvasQR;
let currentURL = "";

function generateQR() {
  let url = document.getElementById("url").value;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  currentURL = url;

  document.getElementById("qrcode").innerHTML = "";

  QRCode.toCanvas(document.createElement('canvas'), url, function (error, canvas) {
    if (!error) {
      canvasQR = canvas;
      document.getElementById("qrcode").appendChild(canvas);
      document.getElementById("actions").style.display = "block";
    }
  });
}

function downloadQR() {
  let link = document.createElement('a');
  link.download = "busr.png";
  link.href = canvasQR.toDataURL();
  link.click();
}

function copyLink() {
  navigator.clipboard.writeText(currentURL);
  alert("تم نسخ الرابط ✅");
}

function copyQR() {
  canvasQR.toBlob(blob => {
    let item = new ClipboardItem({ "image/png": blob });
    navigator.clipboard.write([item]);
    alert("تم نسخ صورة الباركود 📷");
  });
}
</script>

</body>
</html>
